    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Click N' Play - Bienvenida</title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="icon" href="assets/img/favicon.png" type="image/x-icon">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    </head>
    <body class="home">
        <header class="header-index">
            <div class="contenedor-logo-index">
                <img src="assets/img/pruebalogo.png" alt="Logo" id="logo-index">
            </div>
            
        </header>

        <main class="contenedor-centrado">
            <section class="bienvenida">
                <h1>¡Bienvenido a nuestro Autoservicio!</h1>
                <p class="ingreso-nombre">Para comenzar a armar tu pedido de Vinilos y DVDs, por favor indícanos tu nombre.</p>
                
                <form id="formulario-bienvenida">
                    <input type="text" id="cliente-nombre" placeholder="Ingresa tu nombre..." required>
                    <button type="submit" id="btn-continuar">Continuar</button>
                </form>
            </section>
        </main>

        <footer>
            <p>Desarrollado por: Daira Haunau y Gaston Fragueiro </p>
            <a href="https://clickandplay.taplink.site">Conoce mas sobre nosotros</a>
            <button id="theme-toggle">Cambiar tema</button>
        </footer>

        <!-- conexion con js -->
        <script src="js/tema.js"></script>
        <script src="js/index.js"></script>
    </body>
    </html>
