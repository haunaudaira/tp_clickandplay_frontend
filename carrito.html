<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click and Play - Mi Carrito</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="icon" href="./assets/img/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="./assets/img/logoheader.png" alt="Logo Click and Play" id="logo" width="50">
            <h1>Click and Play</h1>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="productos.html">Productos</a>
            <a href="carrito.html">Mi Carrito</a>
            
        </nav>
    </header>

    <main class="contenedor-principal">
        <h2>Tu Pedido</h2>
        
        <section id="contenedor-carrito">
            <!-- los items se inyectan aca -->
        </section>

        <section class="resumen-compra">
            <h3>Total: $<span id="precio-total">0</span></h3>
            <button onclick="confirmarCompra()" class="btn-confirmar">Confirmar Compra</button>
            <button onclick="vaciarCarrito()" class="btn-vaciar">Vaciar Carrito</button>
        </section>
    </main>

    <footer>
        <p>Desarrollado por: Daira Haunau y Gaston Fragueiro</p>
    </footer>

    <div id="modal-confirmacion" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 10px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: sans-serif;">
            <h3 style="margin-top: 0; color: #333;">Confirmar Compra</h3>
            <p style="color: #666;">¿ Confirmar y finalizar la compra en Click and Play?</p>
            <div style="margin-top: 25px; display: flex; justify-content: space-around;">
                <button id="btn-modal-si" style="padding: 10px 25px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Sí, comprar</button>
                <button id="btn-modal-no" style="padding: 10px 25px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Cancelar</button>
            </div>
        </div>
    </div>
    
    <script src="js/tema.js"></script>
    <script src="js/carrito.js"></script>
</body>
</html>
